server.port=${PORT:8080}
spring.application.name=frameforge

# ── Multipart ──
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=500MB

# ── FFmpeg ──
ffmpeg.path=ffmpeg

# ── Database ──
# Production: Render sets DATABASE_URL automatically for PostgreSQL
# Local dev fallback: H2 file database
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./frameforge-db;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASS:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 console (local dev only, disable in production)
spring.h2.console.enabled=${H2_CONSOLE:true}

# ── JWT ──
jwt.secret=${JWT_SECRET:FrameForge-Change-This-Secret-In-Production-Min32Chars!}
jwt.expiration-ms=86400000

# ── CORS ──
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}

# ── Logging ──
logging.level.com.frameforge=DEBUG
