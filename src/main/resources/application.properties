server.port=${PORT:8080}
spring.application.name=frameforge

# ‚îÄ‚îÄ Multipart ‚îÄ‚îÄ
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=500MB

# ‚îÄ‚îÄ FFmpeg ‚îÄ‚îÄ
ffmpeg.path=ffmpeg

# ‚îÄ‚îÄ Database ‚îÄ‚îÄ
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:h2:file:./frameforge-db;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${JDBC_DATABASE_USERNAME:sa}
spring.datasource.password=${JDBC_DATABASE_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.jpa.database-platform=${JPA_DIALECT:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 console (local dev only ‚Äî always false in prod)
spring.h2.console.enabled=${H2_CONSOLE:true}

# ‚îÄ‚îÄ JWT ‚îÄ‚îÄ
jwt.secret=${JWT_SECRET:FrameForge-Change-This-Secret-In-Production-Min32Chars!}
jwt.expiration-ms=86400000

# ‚îÄ‚îÄ CORS ‚îÄ‚îÄ
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}

# ‚îÄ‚îÄ Logging ‚îÄ‚îÄ
logging.level.com.frameforge=DEBUG

